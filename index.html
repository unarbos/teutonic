<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teuton</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

:root {
    --bg: #000;
    --paper: #fff;
    --ink: #000;
    --ink-inv: #fff;
    --ink-muted: #999;
    --border: 1px dashed #000;
    --border-faint: 1px dotted rgba(0,0,0,0.15);
    --font: 'Space Mono', monospace;
    --saw: 8px;
}

[data-theme="dark"] {
    --paper: #111;
    --ink: #ddd;
    --ink-inv: #111;
    --ink-muted: #777;
    --border: 1px dashed #ddd;
    --border-faint: 1px dotted rgba(255,255,255,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--paper);
    color: var(--ink);
    font: 13px/1.5 var(--font);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 0;
    -webkit-font-smoothing: none;
}

.page {
    width: 100%;
    max-width: 1400px;
    background: var(--paper);
    position: relative;
    padding: 32px 48px;
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.page::before, .page::after { display: none; }

.section-label {
    text-transform: uppercase;
    font-weight: bold;
    font-size: 11px;
    border-bottom: var(--border);
    padding-bottom: 4px;
    margin-bottom: 8px;
}

.chart-wrap {
    width: 100%;
    aspect-ratio: 5 / 2;
    position: relative;
}
.chart-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
}
.chart-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    text-transform: uppercase;
    margin-top: 4px;
}

.duel-bar-wrap {
    border: 1px solid var(--ink);
    height: 14px;
    position: relative;
    overflow: hidden;
}
.duel-bar {
    height: 100%;
    background: var(--ink);
    transition: width .4s ease;
}
.duel-info {
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
}
.duel-info span { min-width: 120px; }
.duel-info span:last-child { text-align: right; }
.duel-idle .duel-bar-wrap { opacity: 0.3; }

.scroll-box {
    overflow-y: auto;
    scrollbar-width: thin;
}
.scroll-box::-webkit-scrollbar { width: 4px; }
.scroll-box::-webkit-scrollbar-thumb { background: var(--ink); }
.scroll-queue { max-height: 200px; }
.scroll-hist { max-height: 60vh; }

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    table-layout: fixed;
}
th {
    text-transform: uppercase;
    font-weight: normal;
    font-size: 11px;
    text-align: left;
    padding: 4px 0;
    border-bottom: var(--border);
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 1;
}
td {
    padding: 3px 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
tr { border-bottom: var(--border-faint); }
tr:hover td {
    background: var(--ink);
    color: var(--ink-inv);
    cursor: crosshair;
}
tr:hover td a { color: var(--ink-inv) !important; }
th:last-child, td:last-child { text-align: right; }

[data-theme="dark"] .logo-img { filter: invert(1); }

#theme-toggle {
    background: none;
    border: var(--border);
    color: var(--ink);
    font: 11px/1 var(--font);
    text-transform: uppercase;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
}
#theme-toggle:hover, #chart-mode-toggle:hover {
    background: var(--ink);
    color: var(--ink-inv);
}

#smooth-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 4px;
    background: var(--ink-muted);
    outline: none;
    margin: 0 6px;
    vertical-align: middle;
    cursor: pointer;
}
#smooth-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    background: var(--ink);
    border: none;
    cursor: pointer;
}
#smooth-slider::-moz-range-thumb {
    width: 10px;
    height: 10px;
    background: var(--ink);
    border: none;
    cursor: pointer;
}

@media (max-width: 640px) {
    .page {
        padding: 16px 12px;
        gap: 16px;
    }

    #top-bar {
        flex-wrap: wrap;
        gap: 4px 0;
        font-size: 11px !important;
    }
    #top-bar > span,
    #top-bar > button {
        width: 50%;
    }
    #top-bar > span:nth-child(even),
    #top-bar > button {
        text-align: right;
    }

    .logo-img {
        width: 56px !important;
        height: 56px !important;
    }
    .header-title {
        font-size: 16px !important;
    }

    .section-label {
        flex-wrap: wrap;
        gap: 4px;
    }
    .chart-controls {
        width: 100%;
        justify-content: flex-end;
    }
    #smooth-slider { width: 60px; }

    .chart-wrap { aspect-ratio: 3 / 2; }

    .scroll-box { overflow-x: auto; }
    .scroll-hist table,
    .scroll-queue table {
        table-layout: auto;
        min-width: 500px;
    }
    .scroll-hist table { min-width: 700px; }

    .scroll-hist th:nth-child(6),
    .scroll-hist td:nth-child(6),
    .scroll-hist th:nth-child(8),
    .scroll-hist td:nth-child(8) {
        display: none;
    }

    .duel-info span { min-width: 80px; }

    #last-winner {
        display: flex;
        flex-wrap: wrap;
        gap: 2px 12px;
    }
}
</style>
</head>
<body>
<div class="page">

    <div id="top-bar" style="display:flex;justify-content:space-between;align-items:center;border-bottom:var(--border);padding:6px 0;font-size:12px;text-transform:uppercase;">
        <span>TAO <b id="tao-price">--</b> <span id="tao-change" style="font-size:10px"></span></span>
        <span>SN3 ALPHA <b id="alpha-price">--</b></span>
        <span>SN3 REG <b id="reg-cost">--</b></span>
        <button id="theme-toggle">DARK</button>
    </div>

    <div style="text-align:center;margin-bottom:8px;">
        <img src="favicon.png" alt="Teuton" class="logo-img" style="width:80px;height:80px;margin-bottom:8px;">
        <div class="header-title" style="font-size:20px;font-weight:bold;letter-spacing:0.1em;text-transform:uppercase;">Teutonic-I</div>
        <div style="font-size:11px;margin-top:4px;display:flex;flex-direction:column;align-items:center;gap:4px;text-transform:uppercase;">
            <span><span id="king-health" title="King repo status"></span> KING: <a id="king-link-top" href="#" target="_blank" style="color:var(--ink);text-decoration:none;border-bottom:var(--border);">--</a> <span id="king-rev" style="opacity:0.6;"></span></span>
            <span>VALIDATOR: <a href="https://github.com/unarbos/teutonic" target="_blank" style="color:var(--ink);text-decoration:none;border-bottom:var(--border);">GitHub</a></span>
            <span>DATASET: <a href="https://s3.hippius.com/teutonic-sn3/" target="_blank" style="color:var(--ink);text-decoration:none;border-bottom:var(--border);">Hippius</a></span>
            <span id="king-reign" style="font-size:10px;opacity:0.5;"></span>
        </div>
    </div>

    <div>
        <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;">
            <span id="chart-label">Perplexity</span>
            <span class="chart-controls" style="display:flex;align-items:center;gap:8px;">
                <label style="font-weight:normal;font-size:11px;display:flex;align-items:center;cursor:default;">SMOOTH<input type="range" id="smooth-slider" min="0" max="1" step="0.05" value="0"><span id="smooth-val" style="min-width:1.8em;text-align:right;">0</span></label>
                <button id="chart-mode-toggle" style="background:none;border:var(--border);color:var(--ink);font:11px/1 var(--font);text-transform:uppercase;padding:3px 8px;cursor:pointer;letter-spacing:0.05em;">Loss</button>
            </span>
        </div>
        <div class="chart-wrap">
            <svg id="chart"></svg>
        </div>
        <div class="chart-meta" id="chart-meta">
            <span>--</span>
        </div>
    </div>

    <div id="duel-section" class="duel-idle">
        <div class="section-label" id="duel-label">Idle</div>
        <div class="duel-bar-wrap"><div class="duel-bar" id="duel-bar" style="width:0%"></div></div>
        <div class="duel-info"><span id="duel-progress">--</span><span id="duel-wr">--</span></div>
    </div>

    <div>
        <div class="section-label">Last Winner</div>
        <div id="last-winner" style="font-size:12px;line-height:1.8;min-height:48px;display:flex;flex-wrap:wrap;gap:0 16px;">--</div>
    </div>

    <div>
        <div class="section-label">Queue</div>
        <div class="scroll-box scroll-queue">
            <table>
                <thead><tr>
                    <th>UID</th>
                    <th>Repo</th>
                    <th>Hotkey</th>
                    <th>Block</th>
                    <th>Status</th>
                </tr></thead>
                <tbody id="queue"></tbody>
            </table>
        </div>
    </div>

    <div>
        <div class="section-label">Duel History</div>
        <div class="scroll-box scroll-hist">
            <table>
                <thead><tr>
                    <th>UID</th>
                    <th>Repo</th>
                    <th>Hotkey</th>
                    <th>Verdict</th>
                    <th>mu_hat</th>
                    <th>LCB</th>
                    <th>King Loss</th>
                    <th>Chall Loss</th>
                    <th>When</th>
                </tr></thead>
                <tbody id="hist"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
var DATA_URL = "https://s3.hippius.com/teutonic-sn3/dashboard.json";
var POLL_MS = 5000;
var _lastData = null;
var _chartMode = localStorage.getItem("chartMode") || "ppl";

(function initTheme() {
    var saved = localStorage.getItem("theme");
    var dark = saved ? saved === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.dataset.theme = dark ? "dark" : "light";
})();

function short(s, n) { return s ? s.slice(0, n || 12) + "\u2026" : "--"; }

function timeAgo(iso) {
    if (!iso) return "--";
    var sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (sec < 0) sec = 0;
    if (sec < 60) return sec + "s ago";
    var min = Math.floor(sec / 60);
    if (min < 60) return min + "m ago";
    var hr = Math.floor(min / 60);
    if (hr < 24) return hr + "h ago";
    var day = Math.floor(hr / 24);
    return day + "d ago";
}

function ema(arr, alpha) {
    if (alpha >= 1 || arr.length === 0) return arr.slice();
    var out = [arr[0]];
    for (var i = 1; i < arr.length; i++) {
        out.push(alpha * arr[i] + (1 - alpha) * out[i - 1]);
    }
    return out;
}

var ERROR_MESSAGES = {
    hf_metadata_error: {
        title: "Model Not Found",
        message: function(detail) {
            return "Could not fetch your model metadata from HuggingFace. " +
                "Make sure your repo exists, is public, and has a valid 'main' branch.";
        }
    },
    config_rejected: {
        title: "Config Rejected",
        message: function(detail) {
            if (detail.indexOf("architecture mismatch") !== -1)
                return "Your model architecture doesn't match the current king. " +
                    "Ensure your model uses the same architecture (check 'architectures' in config.json).";
            if (detail.indexOf("mismatch") !== -1)
                return "Your model dimensions don't match the king. " +
                    "Check that vocab_size, hidden_size, num_hidden_layers, " +
                    "num_attention_heads, and other shape parameters in config.json match the king model.";
            if (detail.indexOf("no .safetensors") !== -1)
                return "No .safetensors weight files found in your repo. " +
                    "Upload your model weights in safetensors format.";
            if (detail.indexOf("cannot fetch config.json") !== -1)
                return "Could not download config.json from your repo. " +
                    "Make sure config.json exists at the repo root and the repo is accessible.";
            return "Your model config was rejected: " + detail;
        }
    },
    no_manifest: {
        title: "Dataset Unavailable",
        message: function() {
            return "The evaluation dataset is temporarily unavailable. " +
                "This is not a problem with your model -- it will be retried automatically.";
        }
    },
    eval_error: {
        title: "Evaluation Failed",
        message: function(detail) {
            if (detail.indexOf("CUDA out of memory") !== -1)
                return "Your model ran out of GPU memory during evaluation. " +
                    "Ensure your model fits within the validator's GPU constraints.";
            if (detail.indexOf("weight_shape") !== -1 || detail.indexOf("size mismatch") !== -1)
                return "Model weight shapes don't match the expected architecture. " +
                    "Verify your safetensors match your config.json dimensions.";
            if (detail.indexOf("eval server") !== -1)
                return "The evaluation server encountered an internal error. " +
                    "This is likely transient -- your model will be retried.";
            if (detail.indexOf("stream ended without verdict") !== -1)
                return "The evaluation was interrupted before completing. " +
                    "This is likely transient -- your model will be retried.";
            return "An unexpected error occurred during evaluation. Details: " + detail;
        }
    }
};

function render(d) {
    var mkt = d.market || {};
    if (mkt.tao_price_usd) {
        document.getElementById("tao-price").textContent = "$" + mkt.tao_price_usd.toFixed(2);
        var ch = mkt.tao_change_24h;
        var chEl = document.getElementById("tao-change");
        chEl.textContent = (ch >= 0 ? "+" : "") + ch.toFixed(1) + "%";
        chEl.style.color = ch >= 0 ? "#2a2" : "#c22";
    }
    if (mkt.sn3_alpha_price_tao != null) {
        document.getElementById("alpha-price").textContent = mkt.sn3_alpha_price_tao.toFixed(4) + " \u03C4";
    }
    if (mkt.sn3_reg_burn_tao != null) {
        document.getElementById("reg-cost").textContent = mkt.sn3_reg_burn_tao.toFixed(6) + " \u03C4";
    }

    var king = d.king || {};
    var hist_all = d.history || [];
    var topModel = null;
    for (var ti = 0; ti < hist_all.length; ti++) {
        if (hist_all[ti].accepted && hist_all[ti].challenger_repo) {
            topModel = hist_all[ti]; break;
        }
    }
    var kingRepo = topModel ? topModel.challenger_repo : (king.hf_repo || "--");
    var kingRev = king.king_revision || "";
    var kingLinkTop = document.getElementById("king-link-top");
    kingLinkTop.href = "https://huggingface.co/" + kingRepo;
    kingLinkTop.textContent = kingRepo;
    var kingRevEl = document.getElementById("king-rev");
    if (kingRev) {
        var commitUrl = "https://huggingface.co/" + kingRepo + "/commit/" + kingRev;
        kingRevEl.innerHTML = '@ <a href="' + commitUrl + '" target="_blank" style="color:var(--ink);opacity:0.6">' + kingRev.slice(0, 8) + '</a>';
    } else {
        kingRevEl.textContent = "";
    }
    var healthEl = document.getElementById("king-health");
    healthEl.textContent = "\u25CF ";
    healthEl.style.color = "#2a2";
    healthEl.title = "King repo live";
    var reignEl = document.getElementById("king-reign");
    reignEl.textContent = king.reign_number != null ? "REIGN #" + king.reign_number + (king.crowned_at ? " \u2014 " + king.crowned_at.slice(0, 16) + "Z" : "") : "";

    var hist = (d.history || []).slice().reverse();
    var ev = d.current_eval;

    // --- 1. Chart (king + challenger, perplexity or loss) ---
    var isPpl = _chartMode === "ppl";
    document.getElementById("chart-label").textContent = isPpl ? "Perplexity" : "Loss";
    document.getElementById("chart-mode-toggle").textContent = isPpl ? "Loss" : "Perplexity";

    var kingVals = [], challVals = [];
    for (var i = 0; i < hist.length; i++) {
        if (hist[i].verdict === "error") continue;
        var kl = hist[i].avg_king_loss || 0;
        var cl = hist[i].avg_challenger_loss || 0;
        if (kl || cl) {
            var kv = kl || cl, cv = cl || kl;
            kingVals.push(isPpl ? Math.exp(kv) : kv);
            challVals.push(isPpl ? Math.exp(cv) : cv);
        }
    }
    if (ev && ev.avg_king_loss) {
        var ekv = ev.avg_king_loss;
        var ecv = ev.avg_challenger_loss || ev.avg_king_loss;
        kingVals.push(isPpl ? Math.exp(ekv) : ekv);
        challVals.push(isPpl ? Math.exp(ecv) : ecv);
    }
    var nPts = kingVals.length;

    var smoothVal = parseFloat(document.getElementById("smooth-slider").value);
    var alpha = 1 / (1 + smoothVal * 20);
    var rawKing = kingVals.slice();
    var rawChall = challVals.slice();
    if (smoothVal > 0) {
        kingVals = ema(kingVals, alpha);
        challVals = ema(challVals, alpha);
    }

    var SVG = document.getElementById("chart");
    var rect = SVG.parentElement.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    var W = Math.round(rect.width * dpr);
    var H = Math.round(rect.height * dpr);
    if (W < 100) W = 1400;
    if (H < 40) H = 560;
    var mlBase = window.innerWidth <= 640 ? 50 : 70;
    var ML = Math.round(mlBase * dpr), MR = Math.round(16 * dpr);
    var MT = Math.round(16 * dpr), MB = Math.round(36 * dpr);
    var pw = W - ML - MR, ph = H - MT - MB;
    var lw = dpr;

    SVG.setAttribute("viewBox", "0 0 " + W + " " + H);

    var cs = getComputedStyle(document.documentElement);
    var inkC = cs.getPropertyValue('--ink').trim();
    var mutedC = cs.getPropertyValue('--ink-muted').trim();

    if (nPts < 1) {
        SVG.innerHTML = '<text x="' + (W/2) + '" y="' + (H/2) + '" text-anchor="middle" font-family="Space Mono,monospace" font-size="' + (13*dpr) + '" fill="' + inkC + '">NO DATA</text>';
        document.getElementById("chart-meta").innerHTML = "<span>--</span>";
    } else {

    var allVals = kingVals.concat(challVals).concat(rawKing).concat(rawChall);
    var sorted = allVals.slice().sort(function(a, b) { return a - b; });
    var minL = sorted[0];
    var maxL = sorted[sorted.length - 1];
    if (sorted.length >= 4) {
        var p95 = sorted[Math.floor(sorted.length * 0.95)];
        var iqr = sorted[Math.floor(sorted.length * 0.75)] - sorted[Math.floor(sorted.length * 0.25)];
        var cap = p95 + iqr * 1.5;
        if (maxL > cap && cap > minL) maxL = cap;
    }
    if (isPpl && maxL > 20) maxL = 20;
    var padV = (maxL - minL) * 0.08 || 0.5;
    minL -= padV; maxL += padV;

    function toX(i) { return ML + (nPts > 1 ? (i / (nPts - 1)) * pw : pw / 2); }
    function toY(v) { return MT + ph - ((v - minL) / (maxL - minL)) * ph; }

    var svg = '';
    var fs = Math.round(11 * dpr);
    var font = 'font-family="Space Mono,monospace" font-size="' + fs + '" fill="' + inkC + '"';

    svg += '<line x1="' + ML + '" y1="' + MT + '" x2="' + ML + '" y2="' + (MT + ph) + '" stroke="' + inkC + '" stroke-width="' + lw + '"/>';
    svg += '<line x1="' + ML + '" y1="' + (MT + ph) + '" x2="' + (ML + pw) + '" y2="' + (MT + ph) + '" stroke="' + inkC + '" stroke-width="' + lw + '"/>';

    var nTicks = 8;
    for (var t = 0; t <= nTicks; t++) {
        var val = minL + (maxL - minL) * (t / nTicks);
        var yy = toY(val);
        svg += '<line x1="' + (ML - 5*dpr) + '" y1="' + yy + '" x2="' + ML + '" y2="' + yy + '" stroke="' + inkC + '" stroke-width="' + lw + '"/>';
        svg += '<text x="' + (ML - 8*dpr) + '" y="' + (yy + fs*0.35) + '" text-anchor="end" ' + font + '>' + val.toFixed(2) + '</text>';
        if (t > 0 && t < nTicks) {
            svg += '<line x1="' + ML + '" y1="' + yy + '" x2="' + (ML + pw) + '" y2="' + yy + '" stroke="' + inkC + '" stroke-width="' + (0.5*dpr) + '" stroke-dasharray="' + (3*dpr) + ' ' + (6*dpr) + '"/>';
        }
    }

    for (var i = 0; i < nPts; i++) {
        var xx = toX(i);
        svg += '<line x1="' + xx + '" y1="' + (MT + ph) + '" x2="' + xx + '" y2="' + (MT + ph + 5*dpr) + '" stroke="' + inkC + '" stroke-width="' + lw + '"/>';
        var label = (ev && i === nPts - 1) ? "NOW" : "";
        svg += '<text x="' + xx + '" y="' + (MT + ph + 20*dpr) + '" text-anchor="middle" ' + font + '>' + label + '</text>';
    }

    // Raw ghost lines (faint, only when smoothing active)
    if (smoothVal > 0) {
        var rawCpts = [];
        for (var i = 0; i < nPts; i++) {
            rawCpts.push(toX(i).toFixed(1) + "," + toY(rawChall[i]).toFixed(1));
        }
        svg += '<polyline points="' + rawCpts.join(" ") + '" fill="none" stroke="' + mutedC + '" stroke-width="' + (0.5*dpr) + '" stroke-dasharray="' + (2*dpr) + ' ' + (4*dpr) + '" stroke-linejoin="round" opacity="0.3"/>';

        var rawKpts = [];
        for (var i = 0; i < nPts; i++) {
            rawKpts.push(toX(i).toFixed(1) + "," + toY(rawKing[i]).toFixed(1));
        }
        svg += '<polyline points="' + rawKpts.join(" ") + '" fill="none" stroke="' + inkC + '" stroke-width="' + (0.5*dpr) + '" stroke-dasharray="' + (2*dpr) + ' ' + (4*dpr) + '" stroke-linejoin="round" opacity="0.25"/>';

        for (var i = 0; i < nPts; i++) {
            svg += '<circle cx="' + toX(i).toFixed(1) + '" cy="' + toY(rawKing[i]).toFixed(1) + '" r="' + (1.5*dpr) + '" fill="' + inkC + '" opacity="0.2"/>';
            svg += '<circle cx="' + toX(i).toFixed(1) + '" cy="' + toY(rawChall[i]).toFixed(1) + '" r="' + (1.5*dpr) + '" fill="' + mutedC + '" opacity="0.2"/>';
        }
    }

    // Challenger line (dashed gray)
    var cpts = [];
    for (var i = 0; i < nPts; i++) {
        cpts.push(toX(i).toFixed(1) + "," + toY(challVals[i]).toFixed(1));
    }
    svg += '<polyline points="' + cpts.join(" ") + '" fill="none" stroke="' + mutedC + '" stroke-width="' + (1*dpr) + '" stroke-dasharray="' + (4*dpr) + ' ' + (3*dpr) + '" stroke-linejoin="round"/>';
    for (var i = 0; i < nPts; i++) {
        svg += '<circle cx="' + toX(i).toFixed(1) + '" cy="' + toY(challVals[i]).toFixed(1) + '" r="' + (2*dpr) + '" fill="' + mutedC + '"/>';
    }

    // King line (solid black)
    var kpts = [];
    for (var i = 0; i < nPts; i++) {
        kpts.push(toX(i).toFixed(1) + "," + toY(kingVals[i]).toFixed(1));
    }
    svg += '<polyline points="' + kpts.join(" ") + '" fill="none" stroke="' + inkC + '" stroke-width="' + (1.5*dpr) + '" stroke-linejoin="round"/>';
    for (var i = 0; i < nPts; i++) {
        svg += '<circle cx="' + toX(i).toFixed(1) + '" cy="' + toY(kingVals[i]).toFixed(1) + '" r="' + (3*dpr) + '" fill="' + inkC + '"/>';
    }

    // Legend
    var legX = ML + 12*dpr, legY = MT + 14*dpr;
    svg += '<line x1="' + legX + '" y1="' + legY + '" x2="' + (legX + 20*dpr) + '" y2="' + legY + '" stroke="' + inkC + '" stroke-width="' + (1.5*dpr) + '"/>';
    svg += '<text x="' + (legX + 24*dpr) + '" y="' + (legY + fs*0.35) + '" ' + font + '>KING</text>';
    var leg2X = legX + 80*dpr;
    svg += '<line x1="' + leg2X + '" y1="' + legY + '" x2="' + (leg2X + 20*dpr) + '" y2="' + legY + '" stroke="' + mutedC + '" stroke-width="' + (1*dpr) + '" stroke-dasharray="' + (4*dpr) + ' ' + (3*dpr) + '"/>';
    svg += '<text x="' + (leg2X + 24*dpr) + '" y="' + (legY + fs*0.35) + '" ' + font + ' fill="' + mutedC + '">CHALLENGER</text>';

    SVG.innerHTML = svg;

    var latestK = kingVals[nPts - 1];
    var metaLabel = isPpl ? "KING PPL" : "KING LOSS";
    document.getElementById("chart-meta").innerHTML =
        "<span>" + metaLabel + ": " + latestK.toFixed(4) + "</span><span>EVALS: " + nPts + "</span>";

    } // end chart data block

    // --- Current Duel ---
    var duelSec = document.getElementById("duel-section");
    var duelLabel = document.getElementById("duel-label");
    var duelBar = document.getElementById("duel-bar");
    var duelProgress = document.getElementById("duel-progress");
    var duelWr = document.getElementById("duel-wr");
    if (ev) {
        duelSec.classList.remove("duel-idle");
        if (ev.loading) {
            var loadingName = ev.challenger_repo || short(ev.hotkey, 12);
            if (ev.challenger_repo) {
                duelLabel.innerHTML = '<a href="https://huggingface.co/' + ev.challenger_repo + '" target="_blank" style="color:var(--ink)">' + loadingName + '</a>';
            } else {
                duelLabel.textContent = loadingName;
            }
            duelBar.style.width = "0%";
            duelProgress.textContent = "Loading model \u2026";
            duelWr.textContent = "--";
        } else {
            var pct = ev.total > 0 ? Math.round((ev.progress / ev.total) * 100) : 0;
            var duelName = ev.challenger_repo || short(ev.hotkey, 12);
            if (ev.challenger_repo) {
                duelLabel.innerHTML = '<a href="https://huggingface.co/' + ev.challenger_repo + '" target="_blank" style="color:var(--ink)">' + duelName + '</a>';
            } else {
                duelLabel.textContent = duelName;
            }
            duelBar.style.width = pct + "%";
            duelProgress.textContent = ev.progress + " / " + ev.total + "  (" + pct + "%)";
            duelWr.textContent = "MU: " + (ev.mu_hat || 0).toFixed(6);
        }
    } else {
        var q = d.queue || [];
        if (q.length > 0) {
            duelSec.classList.remove("duel-idle");
            var nextRepo = q[0].hf_repo || "--";
            if (q[0].hf_repo) {
                duelLabel.innerHTML = '<a href="https://huggingface.co/' + q[0].hf_repo + '" target="_blank" style="color:var(--ink)">' + nextRepo + '</a>';
            } else {
                duelLabel.textContent = nextRepo;
            }
            duelBar.style.width = "0%";
            duelProgress.textContent = "Loading model \u2026";
            duelWr.textContent = "--";
        } else {
            duelSec.classList.add("duel-idle");
            duelLabel.textContent = "Idle";
            duelBar.style.width = "0%";
            duelProgress.textContent = "--";
            duelWr.textContent = "--";
        }
    }

    // --- Last Winner ---
    var lwEl = document.getElementById("last-winner");
    var winner = null;
    for (var i = 0; i < (d.history || []).length; i++) {
        if (d.history[i].accepted) { winner = d.history[i]; break; }
    }
    if (winner) {
        var repo = winner.challenger_repo || "--";
        var link = winner.challenger_repo ? '<a href="https://huggingface.co/' + repo + '" target="_blank" style="color:var(--ink)">' + repo + '</a>' : repo;
        lwEl.innerHTML = '<span style="width:100%">' + link + '</span>' +
            '<span>MU_HAT: ' + (winner.mu_hat || 0).toFixed(6) + '</span>' +
            '<span>LCB: ' + (winner.lcb || 0).toFixed(6) + '</span>' +
            '<span>DELTA: ' + (winner.delta || 0).toFixed(4) + '</span>' +
            '<span>KING_LOSS: ' + (winner.avg_king_loss || 0).toFixed(4) + '</span>' +
            '<span>CHALL_LOSS: ' + (winner.avg_challenger_loss || 0).toFixed(4) + '</span>' +
            (winner.wall_time_s ? '<span>' + winner.wall_time_s.toFixed(0) + 's</span>' : '');
    } else {
        lwEl.textContent = "NO DETHRONING YET";
    }

    // --- 2. Queue ---
    var qEl = document.getElementById("queue");
    var q = d.queue || [];
    if (q.length === 0) {
        qEl.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:16px">Queue empty</td></tr>';
    } else {
        qEl.innerHTML = q.map(function(e) {
            var repo = e.hf_repo || "--";
            var repoLink = e.hf_repo ? '<a href="https://huggingface.co/' + e.hf_repo + '" target="_blank" style="color:var(--ink)">' + repo + '</a>' : repo;
            var uid = e.uid != null ? e.uid : "--";
            return '<tr>' +
                '<td>' + uid + '</td>' +
                '<td>' + repoLink + '</td>' +
                '<td>' + (e.hotkey ? '<a href="https://taomarketcap.com/hotkey/' + e.hotkey + '/mining_hotkeys" target="_blank" style="color:var(--ink)">' + short(e.hotkey, 16) + '</a>' : '--') + '</td>' +
                '<td>' + (e.block ? '#' + e.block : '--') + '</td>' +
                '<td>' + (e.reeval ? 'SEEN' : 'UNSEEN') + '</td>' +
                '</tr>';
        }).join("");
    }

    // --- 4. Duel History ---
    var hb = document.getElementById("hist");
    var history = d.history || [];
    if (history.length === 0) {
        hb.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:16px">No duels yet</td></tr>';
    } else {
        hb.innerHTML = history.map(function(h) {
            var isErr = h.verdict === "error";
            var kl = h.avg_king_loss || 0;
            var cl = h.avg_challenger_loss || 0;
            var repo = h.challenger_repo || "--";
            var repoLink = h.challenger_repo ? '<a href="https://huggingface.co/' + h.challenger_repo + '" target="_blank" style="color:var(--ink)">' + repo + '</a>' : repo;
            var uid = h.uid != null ? h.uid : "--";

            var verdictCell;
            if (isErr) {
                var errInfo = ERROR_MESSAGES[h.error_code];
                var tip;
                if (errInfo) {
                    tip = errInfo.title + ": " + errInfo.message(h.error_detail || "");
                } else {
                    tip = (h.error_code || "error") + (h.error_detail ? ": " + h.error_detail : "");
                }
                tip = tip.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
                var label = errInfo ? errInfo.title.toUpperCase() : "ERROR";
                verdictCell = '<td title="' + tip + '" style="color:#c22;cursor:help">' + label + '</td>';
            } else {
                verdictCell = '<td>' + (h.accepted ? "CHALLENGER" : "KING") + '</td>';
            }

            var ago = timeAgo(h.timestamp);
            var fullTs = h.timestamp ? new Date(h.timestamp).toUTCString() : "";
            if (!isErr && h.wall_time_s) ago += " (" + h.wall_time_s.toFixed(0) + "s)";

            return '<tr>' +
                '<td>' + uid + '</td>' +
                '<td>' + repoLink + '</td>' +
                '<td>' + (h.hotkey ? '<a href="https://taomarketcap.com/hotkey/' + h.hotkey + '/mining_hotkeys" target="_blank" style="color:var(--ink)">' + short(h.hotkey, 16) + '</a>' : '--') + '</td>' +
                verdictCell +
                '<td>' + (isErr ? "--" : (h.mu_hat || 0).toFixed(6)) + '</td>' +
                '<td>' + (isErr ? "--" : (h.lcb || 0).toFixed(6)) + '</td>' +
                '<td>' + (isErr ? "--" : kl.toFixed(4)) + '</td>' +
                '<td>' + (isErr ? "--" : cl.toFixed(4)) + '</td>' +
                '<td title="' + fullTs + '">' + ago + '</td>' +
                '</tr>';
        }).join("");
    }
}

async function poll() {
    try {
        var r = await fetch(DATA_URL + "?t=" + Date.now());
        if (r.ok) { _lastData = await r.json(); render(_lastData); }
    } catch (e) {}
}

(function initToggle() {
    var btn = document.getElementById("theme-toggle");
    function updateLabel() {
        btn.textContent = document.documentElement.dataset.theme === "dark" ? "LIGHT" : "DARK";
    }
    updateLabel();
    btn.addEventListener("click", function() {
        var isDark = document.documentElement.dataset.theme === "dark";
        document.documentElement.dataset.theme = isDark ? "light" : "dark";
        localStorage.setItem("theme", document.documentElement.dataset.theme);
        updateLabel();
        if (_lastData) render(_lastData);
    });
})();

(function initChartToggle() {
    document.getElementById("chart-mode-toggle").addEventListener("click", function() {
        _chartMode = _chartMode === "ppl" ? "loss" : "ppl";
        localStorage.setItem("chartMode", _chartMode);
        if (_lastData) render(_lastData);
    });
})();

(function initSmoothSlider() {
    var slider = document.getElementById("smooth-slider");
    var label = document.getElementById("smooth-val");
    var saved = localStorage.getItem("smoothing");
    if (saved != null) { slider.value = saved; }
    label.textContent = slider.value;
    slider.addEventListener("input", function() {
        label.textContent = slider.value;
        localStorage.setItem("smoothing", slider.value);
        if (_lastData) render(_lastData);
    });
})();

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
