# Teutonic-Q3-4B — Qwen3-4B dense as genesis king (vanilla HF Qwen3ForCausalLM, no fork).
# vocab 151936, 36 layers x hidden 2560, GQA 32/8 heads, RoPE theta=1e6, ~8 GB bf16.
# Public eval corpus: FineWeb-Edu Hippius mirror tokenized at eval time with Qwen3 tokenizer.
#
# Genesis is loaded directly from HuggingFace at the pinned commit SHA (no Hippius
# mirror). model_store dispatches by digest prefix: `sha256:` for Hippius OCI,
# `hf:` for HF revisions. Challenger uploads still go through Hippius as normal.
[chain]
name = "Teutonic-Q3-4B"
seed_repo = "Qwen/Qwen3-4B"
# Custom repo_pattern: challengers go to Hippius under <ns>/Teutonic-Q3-4B-<suffix>,
# while seed_repo points at HF. Validator checks pattern only for challengers.
repo_pattern = "^[^/]+/Teutonic-Q3-4B-.+$"

[arch]
module = "archs.qwen3"
# Generic structural keys (vocab/hidden/heads/etc.) are enforced by
# validate_challenger_config automatically. Anything Qwen3-specific that we
# require challengers to preserve goes here.
extra_lock_keys = [
  "rope_theta",
  "rope_scaling",
  "tie_word_embeddings",
  "max_position_embeddings",
]

[seed]
tokenizer_repo = "Qwen/Qwen3-4B"
# HF commit SHA pinned at the time of writing. To update: `huggingface_hub.HfApi().model_info("Qwen/Qwen3-4B").sha`.
seed_digest = "hf:1cfa9a7208912126459214e8b04321603b3df60c"