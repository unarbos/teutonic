# Teutonic-LXXXI — Qwen3-MoE 80B / 7.6B active with native Qwen tokenizer (vocab 151936).
# Replaces Teutonic-LXXX (Gemma/Teutonic-I tokenizer, vocab 262144). Eval uses the
# public FineWeb-Edu Hippius mirror tokenized at eval time with this tokenizer.
[chain]
name = "Teutonic-LXXXI"
seed_repo = "unconst/Teutonic-LXXXI-mock-king"
# repo_pattern auto-derives to "^[^/]+/Teutonic-LXXXI-.+$" if omitted.

[arch]
module = "archs.qwen3_moe"
extra_lock_keys = [
  "num_experts",
  "num_experts_per_tok",
  "moe_intermediate_size",
  "decoder_sparse_step",
  "norm_topk_prob",
  "router_aux_loss_coef",
  "mlp_only_layers",
  "rope_parameters",
]

[seed]
tokenizer_repo = "Qwen/Qwen3-30B-A3B"
# Populated after `python scripts/seed.py --push --hippius` on the GPU box.
seed_digest = ""
