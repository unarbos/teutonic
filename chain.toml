# Teutonic-LXXXI — Qwen3-4B dense king hosted on Hippius Hub.
# Public eval corpus: FineWeb-Edu Hippius mirror tokenized at eval time with
# the Qwen3 tokenizer.
[chain]
name = "Teutonic-LXXXI"
seed_repo = "teutonic/Teutonic-LXXXI-mock-king"
# repo_pattern auto-derives to "^[^/]+/Teutonic-LXXXI-.+$" if omitted.

[arch]
module = "archs.qwen3"
# Generic structural keys (vocab/hidden/heads/etc.) are enforced by
# validate_challenger_config automatically. Anything Qwen3-specific that we
# require challengers to preserve goes here.
extra_lock_keys = [
  "rope_theta",
  "rope_scaling",
  "tie_word_embeddings",
  "max_position_embeddings",
]

[seed]
tokenizer_repo = "Qwen/Qwen3-30B-A3B"
repo_backend = "hippius"

seed_digest = "placeholder"
