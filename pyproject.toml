[project]
name = "koth"
version = "0.1.0"
description = "King of the Hill: decentralized pretraining via sequential sign test"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.2",
    "numpy>=1.26",
    "safetensors>=0.4",
    "huggingface-hub>=0.20",
    "boto3>=1.34",
    "scipy>=1.12",
    "structlog>=24.1",
    "bittensor>=8.0",
]

[project.scripts]
koth = "koth.cli:main"
koth-validator = "koth.cli:run_validator"
koth-miner = "koth.cli:run_miner"
koth-seed = "koth.cli:seed_king"
koth-state = "koth.cli:show_state"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
