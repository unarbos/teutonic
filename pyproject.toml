[project]
name = "teutonic"
version = "0.1.0"
description = "Backward-pass verification for decentralized training"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.2",
    "numpy>=1.26",
    "structlog>=24.1",
]

[project.optional-dependencies]
r2 = ["aioboto3", "boto3", "zstandard"]
wandb = ["wandb"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
